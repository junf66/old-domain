name: WP runner (status-check)

# Processes only "check_status" items from data/wp-install-queue.json.
# "install" items are left in the queue for an MCP-enabled agent
# (Claude + XServer MCP Server) to handle out-of-band.

on:
  workflow_dispatch:
  push:
    paths:
      - "data/wp-install-queue.json"

permissions:
  contents: write

concurrency:
  group: wp-runner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wp-runner
        run: python scripts/wp_runner.py

      - name: Commit results / partial queue
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wp-install-queue.json data/wp-install-results.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: wp-runner status results (auto)"
            git push
          fi
