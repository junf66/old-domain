name: Analyze domains

on:
  # Manual trigger: "Run workflow" button in the Actions tab.
  workflow_dispatch:
    inputs:
      limit:
        description: "Process only the first N domains (debug). Leave 0 for full run."
        required: false
        default: "0"
      force:
        description: "Re-analyse domains even if already in docs/data.json (bypass cache)."
        required: false
        type: boolean
        default: false
  # Auto-run whenever a CSV is added or updated under data/input/.
  push:
    paths:
      - "data/input/**.csv"

permissions:
  contents: write

concurrency:
  group: analyze-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # just under the 6h hard limit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyze.py
        env:
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          LIMIT: ${{ inputs.limit }}
          FORCE: ${{ inputs.force }}
        run: |
          ARGS=""
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/analyze.py $ARGS

      - name: Commit updated docs/data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes in docs/data.json; nothing to commit."
          else
            git commit -m "chore: update docs/data.json (auto)"
            git push
          fi
